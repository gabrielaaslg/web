<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriela León</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#190020;
    --card:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.12);
    --text:#f5f5f5;
    --muted:#9c9c9c;
    --accent:#d6ff4b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Raleway',sans-serif;
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    background:
        radial-gradient(circle at 20% 20%, rgba(214,255,75,.08), transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,.05), transparent 30%),
        var(--bg);
}

/* TEXTURA GRUNGE */
body::before{
    content:"";
    position:fixed;
    inset:0;
    opacity:.05;
    pointer-events:none;
    background-image:
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,.15) 3px
    );
}

.container{
    width:min(92%,700px);
    margin:auto;
    padding:60px 0;
}

.hero{
    text-align:center;
    margin-bottom:50px;
    animation:fadeUp 1s ease;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:auto;
    margin-bottom:20px;
    background:url("avatar.webp") center/cover;
    box-shadow:0 0 40px rgba(214,255,75,.12);
}

h1{
    font-size:2.4rem;
    margin-bottom:10px;
    font-weight:700;
}
h3{
    font-weight:400;
}

.subtitle{
    color:var(--muted);
    font-size:1rem;
    line-height:1.7;
    max-width:500px;
    margin:auto;
}

.badge{
    display:inline-block;
    margin-top:18px;
    padding:8px 14px;
    border:1px solid var(--border);
    border-radius:999px;
    font-size:.8rem;
    color:var(--accent);
}

/* PROYECTOS */

.section-title{
    font-size:.9rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:18px;
    text-align: center;
}

.project{
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-decoration:none;
    color:white;
    padding:22px;
    margin-bottom:14px;
    background:var(--card);
    backdrop-filter:blur(16px);
    border:1px solid var(--border);
    border-radius:15px;
    transition:.35s ease;
    position:relative;
    overflow:hidden;
}

.project::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.06),
    transparent);
    transform:translateX(-100%);
    transition:.6s;
}

.project:hover::before{
    transform:translateX(100%);
}

.project:hover{
    transform:translateY(-5px);
    border-color:rgba(214,255,75,.35);
    box-shadow:
    0 15px 35px rgba(0,0,0,.35),
    0 0 30px rgba(214,255,75,.08);
}

.project-info h3{
    font-size:1.05rem;
    margin-bottom:5px;
}

.project-info p{
    color:var(--muted);
    font-size:.92rem;
}

.arrow{
    font-size:1.4rem;
    transition:.3s;
}

.project:hover .arrow{
    transform:translateX(4px);
    color:var(--accent);
}

/* FOOTER */

.footer{
    margin-top:45px;
    text-align:center;
}

.socials{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
}

.socials a{
    color:var(--muted);
    text-decoration:none;
    border:1px solid var(--border);
    padding:12px 18px;
    border-radius:14px;
    transition:.3s;
}

.socials a:hover{
    color:white;
    border-color:var(--accent);
}

.credit{
    margin-top:25px;
    color:#666;
    font-size:.8rem;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="container">

<section class="hero">

    <div class="avatar"></div>

    <h1>Gabriela León</h1>
    
    <div class="badge"> Bogotá · Colombia </div>
</section>

<div class="section-title">
    Some websites, landing pages, and digital projects I've built recently.
</div>

<a href="http://rentals.chattbooth.com/" class="project" target="_blank">
    <div class="project-info">
        <h3>Party Rentals Marketplace</h3>
    </div>
    <div class="arrow">↗</div>
</a>

<a href="https://www.bancamia.com.co/" class="project" target="_blank">
    <div class="project-info">
        <h3>Bancamía Home Page</h3>
    </div>
    <div class="arrow">↗</div>
</a>

<a href="https://www.bancamia.com.co/productos/tarjeta-debito/" class="project" target="_blank">
    <div class="project-info">
        <h3>Visa Debit Product Launch</h3>
    </div>
    <div class="arrow">↗</div>
</a>

<a href="https://www.bancamia.com.co/invertir-cdt-social/" class="project" target="_blank">
    <div class="project-info">
        <h3>Application form landing page</h3>
    </div>
    <div class="arrow">↗</div>
</a>


<a href="https://juliamartinezcoaching.com/" class="project" target="_blank">
    <div class="project-info">
        <h3>Coaching & Personal Brand Website</h3>
    </div>
    <div class="arrow">↗</div>
</a>

<section class="footer">

    <div class="socials">
        <a href="https://www.linkedin.com/in/gabrielaasl/" target="_blank">LinkedIn</a>
        <a href="CV.pdf" target="_blank">CV</a>
        <a href="mailto:gabrielasofialeon@gmail.com" target="_blank">Email</a>
    </div>

    <div class="credit">
        © 2026 Gabriela León
    </div>

</section>

</div>

</body>
</html>
